name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(c.statements) + ' |');
              console.log('| Branches | ' + fmt(c.branches) + ' |');
              console.log('| Functions | ' + fmt(c.functions) + ' |');
              console.log('| Lines | ' + fmt(c.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update coverage history
        if: always() && github.event_name == 'push'
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "No coverage data found, skipping history update"
            exit 0
          fi

          HISTORY_FILE="docs/coverage-history.md"
          mkdir -p docs

          # Create file with header if it doesn't exist
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "# Coverage History" > "$HISTORY_FILE"
            echo "" >> "$HISTORY_FILE"
            echo "| Date | Commit | Branch | Statements | Branches | Functions | Lines |" >> "$HISTORY_FILE"
            echo "|------|--------|--------|------------|----------|-----------|-------|" >> "$HISTORY_FILE"
          fi

          # Append new row
          ROW=$(node -e "
            const c = require('./coverage/coverage-summary.json').total;
            const date = new Date().toISOString().split('T')[0];
            const sha = '${GITHUB_SHA}'.slice(0, 7);
            const branch = '${GITHUB_REF_NAME}';
            console.log('| ' + date + ' | ' + sha + ' | ' + branch + ' | ' + c.statements.pct + '% | ' + c.branches.pct + '% | ' + c.functions.pct + '% | ' + c.lines.pct + '% |');
          ")
          echo "$ROW" >> "$HISTORY_FILE"

          # Commit the updated file
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$HISTORY_FILE"
          git diff --cached --quiet || git commit -m "docs: update coverage history [skip ci]"
          git push

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7

  # Lighthouse performance audit on PRs
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
        continue-on-error: true
